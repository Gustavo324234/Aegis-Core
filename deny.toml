[advisories]
ignore = [
    "RUSTSEC-2025-0057",
    # paste is unmaintained (pulled by boa_engine). No safe upgrade available.
    "RUSTSEC-2024-0436",
    # proc-macro-error is unmaintained (pulled by utoipa). No safe upgrade available.
    "RUSTSEC-2024-0370",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unlicense",
]
confidence-threshold = 0.8
