[advisories]
ignore = [
    "RUSTSEC-2025-0057",
    # proc-macro-error es una dependencia transitiva (utoipa y similares).
    # No hay upgrade disponible; el mantenedor está inactivo pero no hay
    # vector de ataque conocido — solo se usa en tiempo de compilación (proc-macro).
    "RUSTSEC-2024-0370",
    # rustls-pemfile is unmaintained (pulled by axum-server). No safe upgrade block available.
    "RUSTSEC-2025-0134",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unlicense",
]
confidence-threshold = 0.8
