[advisories]
ignore = [
    "RUSTSEC-2025-0057",
    # paste is unmaintained (pulled by boa_engine). No safe upgrade available.
    "RUSTSEC-2024-0436",
    # proc-macro-error is unmaintained (pulled by utoipa). No safe upgrade available.
    "RUSTSEC-2024-0370",
    # CORE-304/webrtc: ring 0.16.20 unmaintained. No safe upgrade available.
    "RUSTSEC-2025-0010",
    # ring 0.16.20: overflow panic vulnerability.
    "RUSTSEC-2025-0009",
    # webrtc: rustls-webpki vulnerability ignored name constraints.
    "RUSTSEC-2026-0098",
    # webrtc: rustls-webpki vulnerability wildcard constraints.
    "RUSTSEC-2026-0099",
    # webrtc: rustls-webpki vulnerability CRL parsing panic.
    "RUSTSEC-2026-0104",
    # opus: audiopus_sys unmaintained. No safe upgrade available.
    "RUSTSEC-2026-0150",
    # webrtc-dtls: bincode unmaintained. No safe upgrade available.
    "RUSTSEC-2025-0141",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "Unlicense",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
version = "0.16.20"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]
