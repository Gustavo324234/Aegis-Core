name: "🐋 Docker Publish → GHCR"

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    name: "Build & Push Core Image"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout source"
        uses: actions/checkout@v4

      - name: "🔡 Sanitise image name"
        id: image
        run: |
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${LOWERCASE_OWNER}" >> "$GITHUB_OUTPUT"

      - name: "🏷️ Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.image.outputs.owner }}/aegis-core
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      - name: "🔧 Install system dependencies (Rust)"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            protobuf-compiler \
            cmake \
            build-essential \
            libssl-dev \
            libsqlite3-dev \
            pkg-config

      - name: "🦀 Install Rust stable"
        uses: dtolnay/rust-toolchain@stable

      - name: "⚡ Cache Rust"
        uses: Swatinem/rust-cache@v2

      - name: "🎨 Build UI"
        run: |
          cd shell/ui
          npm ci
          npm run build

      - name: "🔨 Build ank-server"
        run: cargo build --release -p ank-server

      - name: "📦 Prepare Docker context"
        run: |
          mkdir -p ui-dist
          cp -rv shell/ui/dist/* ui-dist/
          cp -v target/release/ank-server .
          chmod +x ank-server

      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔐 Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🚀 Build and push"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: installer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
