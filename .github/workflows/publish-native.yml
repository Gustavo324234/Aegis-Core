name: "📦 Native Binary Publish"

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Job separado para construir ui-dist.tar.gz (se hace una sola vez)
  build-ui:
    name: "Build UI dist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'shell/ui/package-lock.json'

      - name: "🎨 Build UI"
        run: cd shell/ui && npm ci && npm run build

      - name: "📦 Package ui-dist"
        run: |
          mkdir -p dist-ui
          tar -czf dist-ui/ui-dist.tar.gz -C shell/ui/dist .
          sha256sum dist-ui/ui-dist.tar.gz > dist-ui/ui-dist.tar.gz.sha256

      - name: "⬆️ Upload ui-dist artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist-pkg
          path: dist-ui/*

  build:
    name: "Build ${{ matrix.artifact }}"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ank-server-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: ank-server-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ank-server-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ank-server-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: "🔧 Install system dependencies (Linux)"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            protobuf-compiler \
            cmake \
            build-essential \
            libssl-dev \
            libsqlite3-dev \
            pkg-config
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: "🔧 Install system dependencies (Windows)"
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: "🔧 Install system dependencies (macOS)"
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release

      - name: "🔨 Build ank-server"
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p ank-server --target ${{ matrix.target }}

      - name: "📦 Package binary"
        shell: bash
        run: |
          mkdir -p dist
          BIN_NAME="ank-server"
          [ "${{ runner.os }}" = "Windows" ] && BIN_NAME="ank-server.exe"
          SOURCE_BIN="target/${{ matrix.target }}/release/$BIN_NAME"
          cp "$SOURCE_BIN" "dist/${{ matrix.artifact }}"
          cd dist
          if [ "${{ runner.os }}" = "Linux" ]; then
            tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
            shasum -a 256 "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            zip "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
            sha256sum "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-pkg
          path: dist/*

  release:
    name: "🚀 Release Binaries"
    needs: [build, build-ui]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Aegis Release {0}', github.ref_name) || 'Aegis Nightly Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: all-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
