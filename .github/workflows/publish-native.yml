name: "📦 Native Binary Publish"

on:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-ui:
    name: "UI dist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'shell/ui/package-lock.json'
      - name: Build UI
        run: cd shell/ui && npm ci && npm run build
      - name: Package
        run: |
          mkdir -p dist-ui
          tar -czf dist-ui/ui-dist.tar.gz -C shell/ui/dist .
          sha256sum dist-ui/ui-dist.tar.gz > dist-ui/ui-dist.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist-pkg-${{ github.run_id }}
          path: dist-ui/*

  build-linux-x86_64:
    name: "Linux x86_64"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            protobuf-compiler cmake build-essential \
            libssl-dev libsqlite3-dev pkg-config libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64
      - name: Build
        run: cargo build --release -p ank-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/ank-server dist/ank-server-linux-x86_64
          cd dist
          tar -czf ank-server-linux-x86_64.tar.gz ank-server-linux-x86_64
          sha256sum ank-server-linux-x86_64.tar.gz > ank-server-linux-x86_64.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-pkg-${{ github.run_id }}
          path: dist/*

  build-linux-arm64:
    name: "Linux ARM64"
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            protobuf-compiler cmake build-essential \
            libssl-dev libsqlite3-dev pkg-config libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-arm64
      - name: Build
        run: cargo build --release -p ank-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/ank-server dist/ank-server-linux-arm64
          cd dist
          tar -czf ank-server-linux-arm64.tar.gz ank-server-linux-arm64
          sha256sum ank-server-linux-arm64.tar.gz > ank-server-linux-arm64.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-pkg-${{ github.run_id }}
          path: dist/*

  build-macos-arm64:
    name: "macOS ARM64"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: System dependencies
        run: brew install protobuf cmake
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64
      - name: Build
        run: cargo build --release -p ank-server
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/ank-server dist/ank-server-macos-arm64
          cd dist
          zip ank-server-macos-arm64.zip ank-server-macos-arm64
          shasum -a 256 ank-server-macos-arm64.zip > ank-server-macos-arm64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-pkg-${{ github.run_id }}
          path: dist/*

  build-macos-x86_64:
    name: "macOS x86_64"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: System dependencies
        run: brew install protobuf cmake
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-x86_64
      - name: Build
        run: cargo build --release -p ank-server --target x86_64-apple-darwin
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/ank-server dist/ank-server-macos-x86_64
          cd dist
          zip ank-server-macos-x86_64.zip ank-server-macos-x86_64
          shasum -a 256 ank-server-macos-x86_64.zip > ank-server-macos-x86_64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64-pkg-${{ github.run_id }}
          path: dist/*

  build-windows-x86_64:
    name: "Windows x86_64"
    runs-on: windows-latest
    env:
      VCPKG_ROOT: C:\vcpkg
      OPENSSL_DIR: C:\vcpkg\installed\x64-windows-static
      OPENSSL_STATIC: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:x64-windows-static
          vcpkg integrate install
      - name: Install protoc
        run: choco install protoc -y
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64
      - name: Build
        run: cargo build --release -p ank-server
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/ank-server.exe dist/ank-server-windows-x86_64.exe
          cd dist
          7z a ank-server-windows-x86_64.zip ank-server-windows-x86_64.exe
          sha256sum ank-server-windows-x86_64.zip > ank-server-windows-x86_64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-pkg-${{ github.run_id }}
          path: dist/*

  release:
    name: "🚀 Publish Release"
    needs:
      - build-ui
      - build-linux-x86_64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-x86_64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-ui.result == 'success' &&
      needs.build-linux-x86_64.result == 'success' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-dist
          pattern: "*-pkg-${{ github.run_id }}"
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'nightly' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Aegis Core {0}', github.ref_name) || 'Aegis Core — Nightly Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: all-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
