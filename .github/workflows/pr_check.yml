name: SRE Firewall

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust — fmt + clippy + test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: test
        run: cargo test --workspace

      - name: deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: "--workspace"

  ui:
    name: UI — build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'shell/ui/package-lock.json'

      - name: Install dependencies
        run: cd shell/ui && npm ci

      - name: Build
        run: cd shell/ui && npm run build

      - name: Lint
        run: cd shell/ui && npm run lint

  installer:
    name: Installer — shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck installer/*.sh
          shellcheck installer/aegis
