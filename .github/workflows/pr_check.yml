name: SRE Firewall

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust — fmt + clippy + test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # SRE-FIX: PAT en lugar de GITHUB_TOKEN para que el auto-commit de fmt/clippy
          # dispare el workflow en el nuevo HEAD. Con GITHUB_TOKEN, GitHub bloquea el
          # re-trigger y el PR queda en "Waiting for status to be reported" indefinidamente.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Auto-format code
        run: cargo fmt --all

      - name: Clippy auto-fix
        run: cargo clippy --workspace --fix --allow-dirty --allow-staged -- -D warnings

      - name: Commit fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format and clippy fixes [skip ci]"
          file_pattern: "*.rs"

      - name: Strict checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: test
        run: cargo test --workspace

      - name: deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: "--workspace"

  ui:
    name: UI — build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'shell/ui/package-lock.json'

      - name: Install dependencies
        run: cd shell/ui && npm ci

      - name: Build
        run: cd shell/ui && npm run build

      - name: Lint
        run: cd shell/ui && npm run lint

  installer:
    name: Installer — shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck installer/*.sh
          shellcheck installer/aegis
