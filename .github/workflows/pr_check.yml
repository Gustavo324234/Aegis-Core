name: SRE Firewall

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust — fmt + clippy + test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libsqlcipher-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

      - name: test
        run: cargo test --workspace

      - name: Clear cargo-deny advisory database
        run: rm -rf ~/.cargo/advisory-dbs

      - name: deny
        uses: EmbarkStudios/cargo-deny-action@v2

  ui:
    name: UI — build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'shell/ui/package-lock.json'

      - name: Install dependencies
        run: cd shell/ui && npm ci

      - name: Build
        run: cd shell/ui && npm run build

      - name: Lint
        run: cd shell/ui && npm run lint

  installer:
    name: Installer — shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          shellcheck installer/*.sh
          shellcheck installer/aegis

  installer-windows:
    name: Installer — PowerShell 5.1 parse check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # aegis.cmd invokes powershell.exe (Windows PowerShell 5.1), so the
      # scripts must parse under 5.1 — PS7-only syntax like `??` or a missing
      # UTF-8 BOM (5.1 decodes BOM-less files as ANSI) breaks every install.
      - name: Parse .ps1 scripts under Windows PowerShell 5.1
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem installer -Filter *.ps1 | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            $hasBom = ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)
            $hasNonAscii = $null -ne ($bytes | Where-Object { $_ -gt 127 } | Select-Object -First 1)
            if ($hasNonAscii -and -not $hasBom) {
              $failed = $true
              Write-Host "::error file=installer/$($_.Name)::non-ASCII content without UTF-8 BOM (PS 5.1 will decode as ANSI)"
            }
            $tokens = $null; $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errs) | Out-Null
            if ($errs.Count -gt 0) {
              $failed = $true
              Write-Host "::error file=installer/$($_.Name)::$($errs.Count) parse errors under PowerShell 5.1"
              $errs | ForEach-Object { Write-Host "  L$($_.Extent.StartLineNumber): $($_.Message)" }
            } else {
              Write-Host "Parse OK: $($_.Name)"
            }
          }
          if ($failed) { exit 1 }
