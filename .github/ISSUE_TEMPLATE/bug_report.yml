name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Install Aegis with...
        2. Open...
        3. Do...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: diag
    attributes:
      label: Diagnostic output
      description: Paste the output of `sudo aegis diag` here.
      render: shell

  - type: dropdown
    id: install_mode
    attributes:
      label: Installation mode
      options:
        - Native (systemd)
        - Docker
        - Built from source
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Aegis version
      description: Output of `aegis version`
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / Debian 12"
    validations:
      required: true
