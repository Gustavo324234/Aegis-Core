name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please describe the problem you're trying to solve,
        not just the solution — that context helps a lot.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
      placeholder: "I'm trying to do X but Aegis currently doesn't support..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see. Rough ideas are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Kernel (ank-core / ank-http)
        - Web UI (shell)
        - Mobile app
        - Installer / CLI
        - Agent orchestration
        - Memory / VCM
        - Documentation
        - Other
    validations:
      required: true
