services:
  ank-server:
    image: ghcr.io/gustavo324234/aegis-core:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - aegis_data:/data
      - /etc/aegis:/etc/aegis:ro
    environment:
      AEGIS_ROOT_KEY: ${AEGIS_ROOT_KEY}
      AEGIS_DATA_DIR: /data
      AEGIS_MTLS_STRICT: ${AEGIS_MTLS_STRICT:-false}
      AEGIS_TLS_CERT: ${AEGIS_TLS_CERT:-}
      AEGIS_TLS_KEY: ${AEGIS_TLS_KEY:-}
      # Release builds refuse to start without a plugin signer key.
      # If the operator has set AEGIS_PLUGIN_ROOT_KEY in their .env we use
      # it; otherwise we fall back to the unverified-signature mode (same
      # security level as the pre-CORE-FIX zero-key behaviour, just
      # explicit). To harden: set AEGIS_PLUGIN_ROOT_KEY to a hex-encoded
      # ed25519 public key in your compose .env and remove the fallback.
      AEGIS_PLUGIN_ROOT_KEY: ${AEGIS_PLUGIN_ROOT_KEY:-}
      AEGIS_ALLOW_INSECURE_PLUGINS: ${AEGIS_ALLOW_INSECURE_PLUGINS:-1}
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:8000/health || curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  aegis_data:
    driver: local
