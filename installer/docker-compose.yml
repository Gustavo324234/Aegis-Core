services:
  ank-server:
    image: ghcr.io/gustavo324234/aegis-core:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "50051:50051"
    volumes:
      - aegis_data:/data
      - /etc/aegis:/etc/aegis:ro
    environment:
      AEGIS_ROOT_KEY: ${AEGIS_ROOT_KEY}
      AEGIS_DATA_DIR: /data
      AEGIS_MTLS_STRICT: ${AEGIS_MTLS_STRICT:-false}
      AEGIS_TLS_CERT: ${AEGIS_TLS_CERT:-}
      AEGIS_TLS_KEY: ${AEGIS_TLS_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:8000/health || curl -f http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  aegis_data:
    driver: local
