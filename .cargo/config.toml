# .cargo/config.toml — Aegis Core workspace configuration
#
# Platform-specific environment variables for native dependencies.
# Uses openssl-sys target-prefixed var names (X86_64_PC_WINDOWS_MSVC_*)
# so that Windows-only paths are never applied to Linux/macOS CI runners.

# ── Windows MSVC (local dev) ──────────────────────────────────────────────────
# openssl-sys checks {TARGET_UPPERCASE}_OPENSSL_* before the generic OPENSSL_* vars.
# Using X86_64_PC_WINDOWS_MSVC_* prefixes means these entries are only read when
# cargo is compiling for the x86_64-pc-windows-msvc target.
# Linux CI runners use x86_64-unknown-linux-gnu, so they never match these names
# and fall through to vendor mode (build openssl-src from source with Perl).
[target.x86_64-pc-windows-msvc]
rustflags = ["-L", "native=C:\\Program Files\\OpenSSL-Win64\\lib\\VC\\x64\\MD"]

[env]
X86_64_PC_WINDOWS_MSVC_OPENSSL_NO_VENDOR   = "1"
X86_64_PC_WINDOWS_MSVC_OPENSSL_DIR         = "C:\\Program Files\\OpenSSL-Win64"
X86_64_PC_WINDOWS_MSVC_OPENSSL_LIB_DIR     = "C:\\Program Files\\OpenSSL-Win64\\lib\\VC\\x64\\MD"
X86_64_PC_WINDOWS_MSVC_OPENSSL_INCLUDE_DIR = "C:\\Program Files\\OpenSSL-Win64\\include"
