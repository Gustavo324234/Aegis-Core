# .cargo/config.toml — Aegis Core workspace configuration
#
# Environment variables for native dependencies on Windows (MSVC toolchain).
# These are only applied when building on Windows; CI (Linux) ignores them.

[env]
# OpenSSL / SQLCipher: the Shining Light installer places MSVC .lib files
# in lib\VC\x64\MD (MD = MultiDynamic, matches Rust's default MSVC CRT).
# Without this, libsqlite3-sys (sqlcipher) emits the wrong search path and
# the linker fails with LNK1181: cannot open input file 'libcrypto.lib'.
OPENSSL_DIR         = { value = "C:\\Program Files\\OpenSSL-Win64", force = false }
OPENSSL_LIB_DIR     = { value = "C:\\Program Files\\OpenSSL-Win64\\lib\\VC\\x64\\MD", force = false }
OPENSSL_INCLUDE_DIR = { value = "C:\\Program Files\\OpenSSL-Win64\\include", force = false }
